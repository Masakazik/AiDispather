services:
  postgres:
    image: postgres:16-alpine
    container_name: homedispatcher-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-homedispatcher}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homedispatcher}
      POSTGRES_DB: ${POSTGRES_DB:-homedispatcher}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homedispatcher}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: homedispatcher-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    container_name: homedispatcher-app
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ${APP_ENV_FILE:-backend/.env}
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-homedispatcher}:${POSTGRES_PASSWORD:-homedispatcher}@postgres:5432/${POSTGRES_DB:-homedispatcher}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${APP_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
