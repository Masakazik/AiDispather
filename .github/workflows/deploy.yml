name: Deploy to production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Backend tests (if configured)
        run: |
          node -e "const p=require('./backend/package.json'); process.exit(p.devDependencies?.jest ? 0 : 1)" \
            && npm run test -w backend -- --passWithNoTests \
            || echo "Jest is not configured in backend/devDependencies, skipping tests"

  deploy:
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            cd /home/homedispatcher
            git fetch origin main
            git reset --hard origin/main
            bash scripts/deploy.sh
